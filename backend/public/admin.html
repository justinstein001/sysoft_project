<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSOFT Engine Console</title>
    <style>
        :root { --bg-main: #0f172a; --bg-card: #1e293b; --primary: #4f46e5; --text-dark: #f8fafc; --text-muted: #94a3b8; --border: #334155; --success: #10b981; --danger: #ef4444; --danger-hover: #dc2626; --warning: #f59e0b; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg-main); color: var(--text-dark); margin: 0; padding: 15px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { background: var(--bg-card); padding: 16px 20px; border-radius: 14px; margin-bottom: 20px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1024px) { .grid { grid-template-columns: 2fr 1fr; } }
        .card { background: var(--bg-card); border-radius: 14px; padding: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        
        /* Responsive Table */
        table { width: 100%; border-collapse: collapse; }
        th { color: var(--text-muted); background: #0b111e; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
        
        @media (max-width: 850px) {
            thead { display: none; }
            tr { display: block; background: #0b111e; border-radius: 8px; margin-bottom: 15px; padding: 10px; border: 1px solid var(--border); }
            td { display: flex; justify-content: space-between; padding: 8px 0; border: none; }
            td::before { content: attr(data-label); font-weight: bold; color: var(--text-muted); margin-right: 10px; }
        }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-size: 12px; color: var(--text-muted); }
        input, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-main); color: var(--text-dark); box-sizing: border-box; }
        .btn-action { padding: 10px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; width: 100%; margin-top: 5px; }
        
        #authScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg-main); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .login-box { background: var(--bg-card); padding: 25px; border-radius: 16px; width: 90%; max-width: 340px; border: 1px solid var(--border); }
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
        .product-item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="login-box">
        <h3 style="margin-top:0; text-align:center;">Terminal Gateway</h3>
        <form onsubmit="executeAdminAuth(event)">
            <div class="form-group"><label>Username</label><input type="text" id="authUser" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="authPass" required></div>
            <button type="submit" class="btn-action" style="background:var(--primary); color:white;">Sign In</button>
        </form>
    </div>
</div>

<div class="container" id="mainDashboard" style="display: none;">
    <header>
        <h2 style="margin:0; font-size:18px;">SYSOFT Console</h2>
        <button class="btn-action" style="background: #475569; color: white; width: auto;" onclick="logoutAdmin()">Exit</button>
    </header>

    <div class="grid">
        <div class="card">
            <h3 style="margin-top:0; font-size:15px;">🛒 Dispatch Logs</h3>
            <table>
                <thead><tr><th>Order ID</th><th>Customer</th><th>Details</th><th>Actions</th></tr></thead>
                <tbody id="ordersTableBody"></tbody>
            </table>
        </div>

        <div>
            <div class="card">
                <h3 style="margin-top:0; font-size:15px;" id="formPanelTitle">📦 New Stock</h3>
                <form id="productForm" onsubmit="handleProductUpload(event)">
                    <div class="form-group"><label>Name</label><input type="text" id="prodName" required></div>
                    <div class="form-group"><label>Price (RWF)</label><input type="number" id="prodPrice" required></div>
                    <div class="form-group"><label>Qty</label><input type="number" id="prodStock" required></div>
                    <div class="form-group"><label>Image</label><input type="file" id="prodImage" accept="image/*" required></div>
                    <button type="submit" id="submitFormBtn" class="btn-action" style="background:var(--primary); color:white;">Upload</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'https://sysoft-server.onrender.com';
    let dynamicSessionToken = localStorage.getItem('adminToken');

    window.addEventListener('DOMContentLoaded', () => { if (dynamicSessionToken) showDashboardContent(); });

    async function executeAdminAuth(e) {
        e.preventDefault();
        const res = await fetch(`${API_BASE}/api/admin/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: document.getElementById('authUser').value, password: document.getElementById('authPass').value })
        });
        const data = await res.json();
        if(data.success) {
            localStorage.setItem('adminToken', data.token);
            dynamicSessionToken = data.token;
            showDashboardContent();
        } else { alert("Auth Failed"); }
    }

    function showDashboardContent() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainDashboard').style.display = 'block';
        fetchAdminOrders();
    }

    async function fetchAdminOrders() {
        const res = await fetch(`${API_BASE}/api/admin/orders`, { headers: { 'Authorization': `Bearer ${dynamicSessionToken}` }});
        const orders = await res.json();
        const tbody = document.getElementById('ordersTableBody');
        tbody.innerHTML = '';
        orders.forEach(order => {
            tbody.innerHTML += `
                <tr>
                    <td data-label="Order ID">#00${order.id}</td>
                    <td data-label="Customer">${order.full_name || 'N/A'}<br><small>${order.phone}</small></td>
                    <td data-label="Details">${parseInt(order.total_amount).toLocaleString()} RWF<br><small>${order.district}</small></td>
                    <td data-label="Actions">
                        ${order.payment_status === 'PENDING' ? `<button class="btn-action" style="background:var(--success); color:white;" onclick="updateOrderStatus(${order.id}, 'COMPLETED')">Approve</button>` : '✅'}
                        <button class="btn-action" style="background:var(--danger); color:white;" onclick="deleteUnwantedOrder(${order.id})">Delete</button>
                    </td>
                </tr>`;
        });
    }

    function logoutAdmin() { localStorage.removeItem('adminToken'); location.reload(); }
    async function updateOrderStatus(id, status) { /* Add your logic here */ }
    async function deleteUnwantedOrder(id) { /* Add your logic here */ }
    async function handleProductUpload(e) { e.preventDefault(); /* Add your logic here */ }
</script>
</body>
</html>
